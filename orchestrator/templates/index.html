<!DOCTYPE html>
<html>
<head><title>AI Engineering OS</title>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, sans-serif; background: #0d1117; color: #e6edf3; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
.container { max-width: 800px; width: 100%; padding: 2rem; }
.card { background: #161b22; border-radius: 16px; padding: 2rem; border: 1px solid #30363d; }
h1 { font-size: 2rem; background: linear-gradient(135deg, #58a6ff, #f0883e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.subtitle { color: #8b949e; margin-bottom: 2rem; }
textarea { width: 100%; padding: 1rem; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3; min-height: 120px; }
button { background: #238636; color: white; border: none; padding: 0.75rem; border-radius: 8px; font-size: 1rem; cursor: pointer; width: 100%; margin-top: 1rem; }
button:hover { background: #2ea043; }
.agents-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.5rem; margin: 0.5rem 0; }
.agent-tag { background: #21262d; padding: 0.25rem; border-radius: 4px; font-size: 0.7rem; text-align: center; border: 1px solid #30363d; }
.result { margin-top: 1.5rem; background: #0d1117; padding: 1rem; border-radius: 8px; border: 1px solid #30363d; display: none; }
.result.show { display: block; }
.loading { display: none; text-align: center; padding: 1rem; }
.loading.show { display: block; }
.spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #30363d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
<div class="card">
<h1>🧠 AI Engineering OS</h1>
<p class="subtitle">Distributed Autonomous Software Engineering Platform</p>
<form id="projectForm">
<textarea id="description" placeholder="مثال: ابنِ لي منصة تعليمية تفاعلية..."></textarea>
<div class="agents-grid">
<span class="agent-tag">plandex</span><span class="agent-tag">openhands</span>
<span class="agent-tag">aider</span><span class="agent-tag">swe</span>
<span class="agent-tag">continue</span><span class="agent-tag">bolt</span>
<span class="agent-tag">gemini</span><span class="agent-tag">hermes</span>
</div>
<button type="submit">🚀 بناء المشروع</button>
</form>
<div class="loading" id="loading"><div class="spinner"></div><p>جاري البناء...</p></div>
<div class="result" id="result"><h3>النتيجة</h3><pre id="resultContent"></pre></div>
</div>
</div>
<script>
document.getElementById('projectForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const desc = document.getElementById('description').value.trim();
  if (!desc) return alert('أدخل وصفاً');
  document.getElementById('loading').classList.add('show');
  document.getElementById('result').classList.remove('show');
  try {
    const res = await fetch('/api/project', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({description: desc})
    });
    const data = await res.json();
    document.getElementById('resultContent').textContent = JSON.stringify(data, null, 2);
    document.getElementById('result').classList.add('show');
  } catch(e) {
    document.getElementById('resultContent').textContent = 'Error: ' + e.message;
    document.getElementById('result').classList.add('show');
  }
  document.getElementById('loading').classList.remove('show');
});
</script>
</body>
</html>
